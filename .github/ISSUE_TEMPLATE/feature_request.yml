name: Feature Request
description: Suggest a new feature or enhancement
labels: feature request
body:
  - type: markdown
    attributes:
      value: >
        Thanks for suggesting a feature!
  - type: input
    attributes:
      label: Summary
      description: A brief description of the feature you'd like to see.
    validations:
      required: true
  - type: textarea
    attributes:
      label: What problem does this solve?
      description: >
        Describe the use case or problem that this feature would address.
    validations:
      required: true
  - type: textarea
    attributes:
      label: The Ideal Solution
      description: >
        How would you like this to work? Include code examples if possible.
      render: go
  - type: textarea
    attributes:
      label: Alternatives Considered
      description: >
        Have you considered any alternative solutions or workarounds?
  - type: checkboxes
    attributes:
      label: Checklist
      description: >
        Let's make sure this hasn't already been requested!
      options:
        - label: I have searched the open issues for duplicates.
          required: true
  - type: textarea
    attributes:
      label: Additional Context
      description: If there is anything else to say, please do so here.
